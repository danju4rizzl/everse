<body>
  <div class="container-fluid p-0">
    <main class="main">
      <div class="bg1" id="dateTime">
        <p id="greetings">--</p>
        <h2 id="time"><span>--</span></h2>
        <p id="date">--</p>
      </div>

      <div class="bg1 weather" id="weather">
        <div class="weather__units">
          <p>
            <span>F</span>
            |
            <span data-unit="active">C</span>
          </p>
        </div>

        <div class="weather__temp">
          <i id="icon"></i>
          <h2 id="temperature">--°</h2>
          <p id="location">--</p>
        </div>
      </div>

      <div class="bg1">
        <div id="covid">
          <p id="deaths">--</p>
          <p id="confirmed">--</p>
          <p id="recovered">--</p>
          <p>Covid Info</p>
        </div>
      </div>

      <div class="bg1">
        <div id="quickLinks" class="quick-link">


          <form action="" class="quick-link__form toggledWidget">
            <input type="text" placeholder="Name" class="quick-link__input form-control">

            <input type="url" placeholder="Url" class="quick-link__input  form-control">

            <div class="quick-link__controls">
              <button type="button" class="btn btn-danger mx-2">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary mx-2">
                Add
              </button>
            </div>
          </form>
        </div>
      </div>
      <div class="bg1">
        <!-- TODO LIST START -->

        <div class="todo">
          <form class="todo-form">
            <input type="text" class="todo-input" placeholder="Add a Todo...">
          </form>

          <ul class="todo-items"></ul>
        </div>
        <!-- TODO LIST END -->
      </div>

      <div class="bg2" id="verse">
        <div class="verse">
          <h2 class="verse__title">Verse of the day</h2>
          <p class="verse__content">--</p>
          <p class="verse__book">--</p>
        </div>
      </div>
    </main>
  </div>
